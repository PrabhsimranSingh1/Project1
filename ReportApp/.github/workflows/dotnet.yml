name: .NET CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'

      - name: Show files
        run: ls -R

      - name: Restore
        run: dotnet restore ReportApp/ReportApp.csproj

      - name: Build
        run: dotnet build ReportApp/ReportApp.csproj --configuration Release --no-restore
